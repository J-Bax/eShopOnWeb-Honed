# ── eShopOnWeb Target Configuration ──────────────────────────────────────────
# Target-level config for the eShopOnWeb PublicApi project.
# Overrides engine defaults from harness-csharp/config.yaml.

Name: "eShopOnWeb"
BaseBranch: "main"

# ── Target API overrides ─────────────────────────────────────────────────────
Api:
  SolutionPath: "eShopOnWeb.sln"
  ProjectPath: "src\\PublicApi"
  TestProjectPath: "tests\\PublicApiIntegrationTests"
  SourceCodePaths:
    - "src\\PublicApi"
    - "src\\ApplicationCore"
    - "src\\Infrastructure"
  SourceFileGlob: "*.cs"
  BaseUrl: "http://localhost:0"
  HealthEndpoint: "/health"
  GcEndpoint: "/diag/gc"
  StartupTimeout: 120
  ResultsPath: "results"
  MetadataPath: "results\\metadata"

# ── Lifecycle Hooks ──────────────────────────────────────────────────────────
# ALL hooks must be declared. Use Type: Skip for phases not needed.
Hooks:
  Prepare:
    Type: Command
    Value: 'pwsh -NonInteractive -File .hone\hooks\prepare.ps1'
  Build:
    Type: BuiltIn
    Name: dotnet-build
  Test:
    Type: BuiltIn
    Name: dotnet-test
  Start:
    Type: BuiltIn
    Name: dotnet-start
  Stop:
    Type: BuiltIn
    Name: dotnet-stop
  Ready:
    Type: BuiltIn
    Name: health-poll
  Warmup:
    Type: Skip
  Active:
    Type: BuiltIn
    Name: k6-run
  Cooldown:
    Type: Http
    Method: POST
    Path: "/diag/gc"
  Cleanup:
    Type: Skip

# ── Scale Test overrides ─────────────────────────────────────────────────────
ScaleTest:
  ScenarioPath: '.hone\scenarios\baseline.js'
  ScenarioRegistryPath: '.hone\scenarios\thresholds.json'
  WarmupEnabled: true
  WarmupScenarioPath: '.hone\scenarios\warmup.js'
  MeasuredRuns: 5
  CooldownSeconds: 5

# ── .NET Performance Counters ────────────────────────────────────────────────
DotnetCounters:
  Enabled: true
  Providers:
    - System.Runtime
    - Microsoft.AspNetCore.Hosting
    - Microsoft.AspNetCore.Http.Connections
    - System.Net.Http
  RefreshIntervalSeconds: 1
